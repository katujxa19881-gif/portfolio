<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новое событие — CRM НПО ЦТС</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-lg bg-white rounded-xl shadow-sm border border-slate-200">
    <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">Новое событие</h1>
      <a href="customer-card.html" class="text-slate-400 hover:text-slate-600 text-xl">×</a>
    </div>
    <form class="p-6 space-y-4 text-sm">
      <div>
        <label class="block font-medium text-slate-700 mb-1">Заказчик</label>
        <input type="text" value="ООО «Телеком-Сервис»" disabled class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-slate-500">
      </div>
      <div>
        <label class="block font-medium text-slate-700 mb-1">Тип события</label>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="rounded-lg border border-blue-500 bg-blue-50 text-blue-700 px-3 py-1.5">Звонок</button>
          <button type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-slate-600">Встреча</button>
          <button type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-slate-600">КП</button>
          <button type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-slate-600">Запрос</button>
          <button type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-slate-600">Обратная связь</button>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block font-medium text-slate-700 mb-1">Дата контакта</label>
          <input type="date" value="2026-06-01" class="w-full rounded-lg border border-slate-300 px-3 py-2">
        </div>
        <div>
          <label class="block font-medium text-slate-700 mb-1">Дата планового контакта</label>
          <input type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2">
        </div>
      </div>
      <div>
        <label class="block font-medium text-slate-700 mb-1">Комментарий</label>
        <textarea rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="О чём договорились, следующий шаг…"></textarea>
      </div>
      <div>
        <label class="block font-medium text-slate-700 mb-1">Файл (КП / письмо)</label>
        <input type="file" class="w-full text-slate-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="customer-card.html" class="rounded-lg border border-slate-300 px-4 py-2 text-slate-600">Отмена</a>
        <button type="button" class="rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2">Сохранить</button>
      </div>
    </form>
  </div>
</body>
</html>
