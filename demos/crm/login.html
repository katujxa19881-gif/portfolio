<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — CRM НПО ЦТС</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 text-white font-bold text-lg mb-3">ЦТС</div>
      <h1 class="text-xl font-semibold text-slate-800">CRM коммерческого отдела</h1>
      <p class="text-sm text-slate-500 mt-1">АО «НПО «ЦТС»</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Логин</label>
          <input type="text" placeholder="ivanov" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
          <input type="password" placeholder="••••••••" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg py-2.5 text-sm transition">Войти</button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">Внутренняя система. Данные — коммерческая тайна.</p>
  </div>
</body>
</html>
