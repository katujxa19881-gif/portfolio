<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Смена пароля — CRM НПО ЦТС</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
      <h1 class="text-lg font-semibold text-slate-800 mb-1">Смена временного пароля</h1>
      <p class="text-sm text-slate-500 mb-5">При первом входе нужно задать постоянный пароль.</p>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Новый пароль</label>
          <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          <p class="text-xs text-slate-400 mt-1">Минимум 8 символов, буквы и цифры.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Повторите пароль</label>
          <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg py-2.5 text-sm transition">Сохранить пароль</button>
      </form>
    </div>
  </div>
</body>
</html>
